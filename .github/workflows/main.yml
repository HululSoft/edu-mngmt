on:
  workflow_dispatch:

jobs:
  build-docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install SSH Client
      run: sudo apt-get install -y openssh-client
        
    - name: Copy Project Files to Remote Machine
      env:
        SSH_PASSWORD: ${{ secrets.DEPLOYMENT_SERVER_SSH_PASS }}
      run: |
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no root@hululsoft.com "rm -rf tmp/hulul-app && mkdir -p /tmp/hulul-app"
        sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no -r * root@hululsoft.com:/tmp/hulul-app
        
    - name: Build Docker Image on Remote Machine
      env:
        SSH_PASSWORD: ${{ secrets.DEPLOYMENT_SERVER_SSH_PASS }}
      run: |
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no root@hululsoft.com \
        "cd /tmp/hulul-app && docker build -t report-app:1.0 ."
